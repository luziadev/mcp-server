name: Publish MCP Server

on:
  push:
    tags:
      - 'v*'

jobs:
  # Build and publish to npm
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build package
        run: npm run build

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set package version
        run: |
          jq '.version = "${{ steps.version.outputs.version }}"' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Pack and publish to npm
        run: |
          npm pack --pack-destination /tmp
          npm publish /tmp/luziadev-mcp-server-${{ steps.version.outputs.version }}.tgz --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Create GitHub Release
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-npm]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: MCP Server v${{ steps.version.outputs.version }}
          generate_release_notes: true
          body: |
            ## Installation

            ```bash
            # Run directly with npx (no install needed)
            LUZIA_API_KEY=lz_your_api_key npx @luziadev/mcp-server --stdio

            # Or install globally
            npm install -g @luziadev/mcp-server
            LUZIA_API_KEY=lz_your_api_key luzia-mcp --stdio
            ```

            ### Claude Desktop / Claude Code
            Add to your config file:
            - **macOS:** `~/Library/Application Support/Claude/claude_desktop_config.json`
            - **Claude Code:** `.claude/settings.json`

            ```json
            {
              "mcpServers": {
                "luzia": {
                  "command": "npx",
                  "args": ["-y", "@luziadev/mcp-server", "--stdio"],
                  "env": {
                    "LUZIA_API_KEY": "lz_your_api_key"
                  }
                }
              }
            }
            ```

            > **Note:** Requires Node.js 20 or later (`node --version`)

            ## Documentation

            - [npm package](https://www.npmjs.com/package/@luziadev/mcp-server)
            - [README](https://github.com/${{ github.repository }}#readme)
